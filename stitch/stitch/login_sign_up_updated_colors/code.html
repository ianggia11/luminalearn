<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#66b2b2",
                        "primary-light": "#b2d8d8",
                        "background-light": "#f6f7f7",
                        "background-dark": "#161c1c",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Sign In - Professional Portal</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100">
<div class="flex min-h-screen flex-col items-center justify-center p-4">
<!-- Main Login Card -->
<div class="w-full max-w-[480px] bg-white dark:bg-slate-900 rounded-xl shadow-xl overflow-hidden border border-primary-light/30">
<!-- Header Section -->
<header class="flex items-center justify-between border-b border-primary-light/20 px-8 py-6 bg-primary/5">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center size-10 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">shield_person</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">Portal Access</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-primary-light/20 text-primary hover:bg-primary-light/40 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<div class="p-8">
<!-- Welcome Text -->
<div class="mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black leading-tight tracking-tight">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-base">Enter your credentials to access your secure dashboard</p>
</div>
<!-- Form Fields -->
<div class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="form-input w-full rounded-lg border border-primary-light/50 bg-white dark:bg-slate-800 dark:border-slate-700 h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-slate-400" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Password</label>
<a class="text-primary text-sm font-medium hover:underline" href="#">Forgot?</a>
</div>
<div class="flex w-full items-stretch rounded-lg overflow-hidden border border-primary-light/50 dark:border-slate-700 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all">
<div class="flex items-center justify-center bg-white dark:bg-slate-800 pl-4 text-slate-400">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="form-input flex-1 border-0 bg-white dark:bg-slate-800 h-14 px-4 text-slate-900 dark:text-slate-100 focus:ring-0 placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="bg-white dark:bg-slate-800 px-4 text-slate-400 hover:text-primary">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Actions -->
<div class="mt-8 space-y-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white h-14 rounded-lg font-bold text-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                        Sign In
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="relative flex py-3 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="flex-shrink mx-4 text-slate-400 text-xs uppercase tracking-widest font-bold">Or continue with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-12 rounded-lg border border-primary-light/50 bg-white dark:bg-slate-800 hover:bg-primary-light/10 transition-colors font-medium text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined text-red-500">google</span>
                            Google
                        </button>
<button class="flex items-center justify-center gap-2 h-12 rounded-lg border border-primary-light/50 bg-white dark:bg-slate-800 hover:bg-primary-light/10 transition-colors font-medium text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined text-blue-600">brand_family</span>
                            SSO
                        </button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-slate-500 dark:text-slate-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline" href="#">Create an account</a>
</p>
</div>
<!-- Decorative Accent -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary-light via-primary to-primary-light"></div>
</div>
<!-- System Status Placeholder -->
<div class="mt-8 flex items-center gap-2 text-slate-400 text-xs font-medium uppercase tracking-widest">
<span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
            All Systems Operational
        </div>
</div>
</body></html>
